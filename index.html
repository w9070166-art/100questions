<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小島醫學生的嚮往</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f5f0e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif TC', serif;
      padding: 20px;
      gap: 28px;
    }

    /* Progress bar */
    .progress-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: #e4ddd2;
    }
    .progress-bar {
      height: 100%;
      background: #b09268;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Header */
    header {
      position: fixed;
      top: 12px; left: 0; right: 0;
      display: flex;
      justify-content: center;
    }
    .site-title {
      font-size: 0.72rem;
      color: #bbb0a0;
      letter-spacing: 0.25em;
      font-weight: 300;
    }

    /* Card scene */
    .card-scene {
      width: 100%;
      max-width: 580px;
      height: 340px;
      perspective: 1400px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.35, 0, 0.25, 1);
      cursor: pointer;
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 40px;
      text-align: center;
      box-shadow: 0 6px 32px rgba(80,60,30,0.08), 0 1px 4px rgba(80,60,30,0.04);
    }

    .card-front { background: #ffffff; }
    .card-back  {
      background: #fdfcf9;
      transform: rotateY(180deg);
    }

    /* Intro */
    .intro-body {
      font-size: 0.95rem;
      color: #5c5248;
      line-height: 2.3;
      letter-spacing: 0.05em;
      font-weight: 300;
    }
    .intro-cta {
      margin-top: 28px;
      font-size: 0.68rem;
      color: #ccc0b0;
      letter-spacing: 0.35em;
      font-weight: 300;
    }

    /* Question */
    .card-num {
      font-size: 0.7rem;
      color: #cfc0a8;
      letter-spacing: 0.35em;
      margin-bottom: 24px;
      font-weight: 300;
    }
    .card-question {
      font-size: 1.38rem;
      color: #28241e;
      line-height: 1.9;
      letter-spacing: 0.08em;
    }
    .card-hint {
      margin-top: 28px;
      font-size: 0.66rem;
      color: #d8cfc4;
      letter-spacing: 0.3em;
      font-weight: 300;
    }

    /* Answer */
    .card-answer {
      font-size: 1.1rem;
      color: #3a352e;
      line-height: 2.3;
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .btn-nav {
      width: 42px;
      height: 42px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #a8987e;
      font-size: 1.1rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .btn-nav:hover:not(:disabled) {
      background: rgba(120,90,50,0.08);
      color: #5a4830;
    }
    .btn-nav:disabled {
      opacity: 0.2;
      cursor: default;
    }
    .progress-label {
      font-size: 0.72rem;
      color: #b8a890;
      letter-spacing: 0.2em;
      min-width: 64px;
      text-align: center;
      font-weight: 300;
    }
    .btn-flip {
      padding: 10px 36px;
      border: 1.5px solid #b09268;
      background: transparent;
      border-radius: 999px;
      font-family: 'Noto Serif TC', serif;
      font-size: 0.9rem;
      color: #7a5c3a;
      letter-spacing: 0.18em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-flip:hover { background: rgba(120,90,50,0.08); }

    @media (max-width: 480px) {
      .card-scene { height: 300px; }
      .card-face  { padding: 36px 28px; }
      .card-question { font-size: 1.2rem; }
      .card-answer   { font-size: 1rem; }
      .intro-body    { font-size: 0.88rem; }
    }

    .btn-menu {
      position: fixed; top: 8px; right: 16px;
      width: 36px; height: 36px;
      border: none; background: none; cursor: pointer;
      font-size: 1.3rem; color: #b8a890; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s; z-index: 10;
    }
    .btn-menu:hover { background: rgba(120,90,50,0.08); color: #5a4830; }
    .list-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(40,30,20,0.45); z-index: 100;
      backdrop-filter: blur(2px);
    }
    .list-overlay.open { display: flex; justify-content: flex-end; }
    .list-panel {
      width: min(360px, 92vw); height: 100%;
      background: #faf7f2; display: flex; flex-direction: column;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .list-head {
      padding: 20px 20px 12px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #ede8e0;
    }
    .list-search {
      flex: 1; border: none; background: #f0ece4; border-radius: 8px;
      padding: 8px 12px; font-family: 'Noto Serif TC', serif;
      font-size: 0.85rem; color: #3a352e; outline: none; letter-spacing: 0.05em;
    }
    .list-search::placeholder { color: #c8bfb4; }
    .btn-close {
      width: 32px; height: 32px; border: none; cursor: pointer;
      font-size: 1.3rem; color: #b0a090; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; transition: background 0.2s;
      background: none;
    }
    .btn-close:hover { background: rgba(120,90,50,0.08); }
    .list-items { flex: 1; overflow-y: auto; padding: 8px 0; }
    .list-item {
      display: flex; align-items: baseline; gap: 12px; padding: 12px 20px;
      cursor: pointer; transition: background 0.15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .list-item:hover { background: #f0ece4; }
    .list-item-num { font-size: 0.6rem; color: #c8bfb4; letter-spacing: 0.2em; min-width: 24px; font-weight: 300; }
    .list-item-q { font-size: 0.9rem; color: #4a4038; line-height: 1.6; letter-spacing: 0.04em; font-family: 'Noto Serif TC', serif; font-weight: 300; }

    .card-back:has(.yuanqi-body) {
      justify-content: flex-start;
      overflow-y: auto;
      padding-top: 32px;
      padding-bottom: 24px;
    }
    .yuanqi-body {
      font-size: 0.88rem;
      color: #5c5248;
      line-height: 2;
      letter-spacing: 0.05em;
      font-weight: 300;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="list-overlay" id="listOverlay">
    <div class="list-panel">
      <div class="list-head">
        <input class="list-search" id="listSearch" placeholder="搜尋題號或關鍵字…">
        <button class="btn-close" id="btnClose">&#215;</button>
      </div>
      <div class="list-items" id="listItems"></div>
    </div>

  <header>
    <span class="site-title">小島醫學生的嚮往</span>
    <button class="btn-menu" id="btnMenu">&#9776;</button>

  <div class="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="front"></div>
      <div class="card-face card-back"  id="back"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-nav" id="btnPrev" aria-label="上一題">&#8592;</button>
    <span class="progress-label" id="label"></span>
    <button class="btn-nav" id="btnNext" aria-label="下一題">&#8594;</button>
  </div>
  <button class="btn-flip" id="btnFlip">翻開</button>

let idx = 0;
let flipped = false;
let animating = false;
let hinted = false;

const cardEl   = document.getElementById('card');
const frontEl  = document.getElementById('front');
const backEl   = document.getElementById('back');
const barEl    = document.getElementById('bar');
const labelEl  = document.getElementById('label');
const btnPrev  = document.getElementById('btnPrev');
const btnNext  = document.getElementById('btnNext');
const btnFlip  = document.getElementById('btnFlip');

function nl2br(s) { return s.replace(/\n/g, '<br>'); }

function updateFlipBtn() {
  btnFlip.textContent = flipped ? '翻回' : '翻開';
}

function render() {
  flipped = false;
  cardEl.classList.remove('flipped');
  updateFlipBtn();

  if (idx === 0) {
    frontEl.innerHTML = `

    labelEl.textContent = '緣起';
    barEl.style.width = '0%';
  } else {
    const item = QA[idx];
    const num  = String(idx).padStart(2, '0');
    frontEl.innerHTML = `
      <div class="card-num">${num}</div>
      <div class="card-question">${item.q}</div>
      ${!hinted ? '<div class="card-hint">輕觸翻牌</div>' : ''}`;
    backEl.innerHTML = `<div class="card-answer">${nl2br(item.a)}</div>`;
    labelEl.textContent = `${idx} / ${qa.length - 1}`;
    barEl.style.width = (idx / (qa.length - 1) * 100) + '%';
  }

  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === qa.length - 1;
}

function flip() {
  if (animating) return;
  if (idx === 0) {
    if (!flipped) { hinted = true; flipped = true; cardEl.classList.add('flipped'); }
    else { go(1); }
    updateFlipBtn();
    return;
  }
  hinted = true;
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
  updateFlipBtn();
}

function go(dir) {
  if (animating) return;
  const next = idx + dir;
  if (next < 0 || next >= qa.length) return;
  animating = true;
  idx = next;
  render();
  setTimeout(() => { animating = false; }, 400);
}

cardEl.addEventListener('click', flip);
btnPrev.addEventListener('click', () => go(-1));
btnNext.addEventListener('click', () => go(1));
btnFlip.addEventListener('click', flip);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

let tx = 0, ty = 0;
cardEl.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });
cardEl.addEventListener('touchend', e => {
  e.preventDefault();
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 12 && Math.abs(dy) < 12) flip();
  else if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
});

const overlay     = document.getElementById('listOverlay');
const listItemsEl = document.getElementById('listItems');
const listSearch  = document.getElementById('listSearch');
const btnMenu     = document.getElementById('btnMenu');
const btnClose    = document.getElementById('btnClose');

function buildList(filter) {
  listItemsEl.innerHTML = '';
  const f = (filter || '').toLowerCase();
  QA.forEach((item, i) => {
    if (!item) return;
    const num = String(i).padStart(2, '0');
    if (f && !num.includes(f) && !item.q.toLowerCase().includes(f)) return;
    const btn = document.createElement('button');
    btn.className = 'list-item';
    btn.innerHTML = '<span class="list-item-num">' + num + '</span><span class="list-item-q">' + item.q + '</span>';
    btn.addEventListener('click', () => { idx = i; render(); closeList(); });
    listItemsEl.appendChild(btn);
  });
}
function openList()  { overlay.classList.add('open'); buildList(''); listSearch.value = ''; listSearch.focus(); }
function closeList() { overlay.classList.remove('open'); }
btnMenu.addEventListener('click', openList);
btnClose.addEventListener('click', closeList);
overlay.addEventListener('click', e => { if (e.target === overlay) closeList(); });
listSearch.addEventListener('input', e => buildList(e.target.value));

render();
</script>
</body>
</html>
