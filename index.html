<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>對生命的嚮往</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f5f0e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif TC', serif;
      padding: 20px;
      gap: 28px;
    }

    /* Progress bar */
    .progress-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: #e4ddd2;
    }
    .progress-bar {
      height: 100%;
      background: #b09268;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Header */
    header {
      position: fixed;
      top: 12px; left: 0; right: 0;
      display: flex;
      justify-content: center;
    }
    .site-title {
      font-size: 0.72rem;
      color: #bbb0a0;
      letter-spacing: 0.25em;
      font-weight: 300;
    }

    /* Card scene */
    .card-scene {
      width: 100%;
      max-width: 580px;
      height: 340px;
      perspective: 1400px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.35, 0, 0.25, 1);
      cursor: pointer;
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 40px;
      text-align: center;
      box-shadow: 0 6px 32px rgba(80,60,30,0.08), 0 1px 4px rgba(80,60,30,0.04);
    }

    .card-front { background: #ffffff; }
    .card-back  {
      background: #fdfcf9;
      transform: rotateY(180deg);
    }

    /* Intro */
    .intro-body {
      font-size: 0.95rem;
      color: #5c5248;
      line-height: 2.3;
      letter-spacing: 0.05em;
      font-weight: 300;
    }
    .intro-cta {
      margin-top: 28px;
      font-size: 0.68rem;
      color: #ccc0b0;
      letter-spacing: 0.35em;
      font-weight: 300;
    }

    /* Question */
    .card-num {
      font-size: 0.7rem;
      color: #cfc0a8;
      letter-spacing: 0.35em;
      margin-bottom: 24px;
      font-weight: 300;
    }
    .card-question {
      font-size: 1.38rem;
      color: #28241e;
      line-height: 1.9;
      letter-spacing: 0.08em;
    }
    .card-hint {
      margin-top: 28px;
      font-size: 0.66rem;
      color: #d8cfc4;
      letter-spacing: 0.3em;
      font-weight: 300;
    }

    /* Answer */
    .card-answer {
      font-size: 1.1rem;
      color: #3a352e;
      line-height: 2.3;
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .btn-nav {
      width: 42px;
      height: 42px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #a8987e;
      font-size: 1.1rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .btn-nav:hover:not(:disabled) {
      background: rgba(120,90,50,0.08);
      color: #5a4830;
    }
    .btn-nav:disabled {
      opacity: 0.2;
      cursor: default;
    }
    .progress-label {
      font-size: 0.72rem;
      color: #b8a890;
      letter-spacing: 0.2em;
      min-width: 64px;
      text-align: center;
      font-weight: 300;
    }

    @media (max-width: 480px) {
      .card-scene { height: 300px; }
      .card-face  { padding: 36px 28px; }
      .card-question { font-size: 1.2rem; }
      .card-answer   { font-size: 1rem; }
      .intro-body    { font-size: 0.88rem; }
    }

    .btn-menu {
      position: fixed; top: 8px; right: 16px;
      width: 36px; height: 36px;
      border: none; background: none; cursor: pointer;
      font-size: 1.3rem; color: #b8a890; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s; z-index: 10;
    }
    .btn-menu:hover { background: rgba(120,90,50,0.08); color: #5a4830; }
    .list-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(40,30,20,0.45); z-index: 100;
      backdrop-filter: blur(2px);
    }
    .list-overlay.open { display: flex; justify-content: flex-end; }
    .list-panel {
      width: min(360px, 92vw); height: 100%;
      background: #faf7f2; display: flex; flex-direction: column;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .list-head {
      padding: 20px 20px 12px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #ede8e0;
    }
    .list-search {
      flex: 1; border: none; background: #f0ece4; border-radius: 8px;
      padding: 8px 12px; font-family: 'Noto Serif TC', serif;
      font-size: 0.85rem; color: #3a352e; outline: none; letter-spacing: 0.05em;
    }
    .list-search::placeholder { color: #c8bfb4; }
    .btn-close {
      width: 32px; height: 32px; border: none; cursor: pointer;
      font-size: 1.3rem; color: #b0a090; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; transition: background 0.2s;
    }
    .btn-close:hover { background: rgba(120,90,50,0.08); }
    .list-items { flex: 1; overflow-y: auto; padding: 8px 0; }
    .list-item {
      display: flex; align-items: baseline; gap: 12px; padding: 12px 20px;
      cursor: pointer; transition: background 0.15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .list-item:hover { background: #f0ece4; }
    .list-item-num { font-size: 0.6rem; color: #c8bfb4; letter-spacing: 0.2em; min-width: 24px; font-weight: 300; }
    .list-item-q { font-size: 0.9rem; color: #4a4038; line-height: 1.6; letter-spacing: 0.04em; font-family: 'Noto Serif TC', serif; font-weight: 300; }
  </style>
</head>
<body>

  <div class="list-overlay" id="listOverlay">
    <div class="list-panel">
      <div class="list-head">
        <input class="list-search" id="listSearch" placeholder="搜尋題號或關鍵字…">
        <button class="btn-close" id="btnClose">&#215;</button>
      </div>
      <div class="list-items" id="listItems"></div>
    </div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="bar"></div></div>
  <header>
    <span class="site-title">不朽對生命的熱望</span>
    <button class="btn-menu" id="btnMenu">&#9776;</button>
  </header>

  <div class="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="front"></div>
      <div class="card-face card-back"  id="back"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-nav" id="btnPrev" aria-label="上一題">&#8592;</button>
    <span class="progress-label" id="label"></span>
    <button class="btn-nav" id="btnNext" aria-label="下一題">&#8594;</button>
  </div>

<script>
const QA = [
  null, // index 0 = intro
  { q:'生活對你來說是什麼？',       a:'一邊不知道在做什麼，\n一邊還是繼續了。\n大概就是這樣。' },
  { q:'為什麼喜歡大海？',           a:'因為它不要求你好好的。\n你可以在它面前，\n什麼都不是。' },
  { q:'你做過什麼浪漫的事？',       a:'不是一束盛開的花，\n是日常生活中，\n說了很多很多的廢話。' },
  { q:'理想的愛是？',               a:'那人讓你眼裡有光。\n而且那道光，\n是你自己的。' },
  { q:'什麼會帶給你安全感？',       a:'有人記得你說過的小事。\n不用提醒，\n他就記得了。' },
  { q:'內心強大的人是？',           a:'不是不怕的人，\n是怕了，\n還是做了的人。' },
  { q:'偶像之於你的意義？',         a:'讓你知道\n可以長成自己喜歡的樣子，\n是真的可以的。' },
  { q:'你想成為怎麼樣的人？',       a:'說話算話的人。\n對自己也是。' },
  { q:'什麼是你人生中的光芒？',     a:'某些普通的下午，\n陽光斜進來，\n你突然覺得活著還不錯。' },
  { q:'朋友是什麼？',               a:'不用解釋就明白你的人。\n或者，解釋了，\n他還是在努力明白。' },
  { q:'生活中有什麼小迷信？',       a:'事情做完才能喝咖啡。\n悲傷的歌不配飯吃。\n下雨天，不做重要決定。' },
  { q:'快樂是什麼？',               a:'不是很大聲的那種。\n是安靜的，在某個瞬間，\n你覺得，剛好。' },
  { q:'你的勝負欲強嗎？',           a:'強。\n但輸掉最多的，\n永遠是跟自己的那場。' },
  { q:'如何抓住靈感？',             a:'不抓。\n好的靈感都在\n你沒在找的時候來。' },
  { q:'分享欲重要嗎？',             a:'重要。\n想分享給誰，\n說明你還有在乎的人。' },
  { q:'你的座右銘？',               a:'慢慢來，\n但不要停。' },
  { q:'你對自己的要求高嗎？',       a:'高到有時候，\n連喘息\n都覺得是在偷懶。' },
  { q:'什麼事物最能撫慰你？',       a:'有人說「我知道」。\n不分析，不建議，\n就只是知道。' },
  { q:'屬於你的季節是？',           a:'秋天。\n不冷也不熱，\n可以穿很多層，把自己包起來。' },
  { q:'你相信命運嗎？',             a:'相信一半。\n有些相遇是命運，\n留下來，是選擇。' },
  { q:'什麼時候感到自由？',         a:'走路沒有目的地的時候。\n還有，不需要解釋自己\n為什麼是這樣的時候。' },
  { q:'喜歡獨處還是熱鬧？',         a:'喜歡獨處，\n但偶爾需要熱鬧，\n來確認自己還在。' },
  { q:'你有過遺憾嗎？',             a:'有。\n但大部分的遺憾，\n當時的我已經盡力了。' },
  { q:'愛情裡最重要的是？',         a:'讓對方也喜歡自己。\n不是你喜歡他，\n是他因為你，喜歡上了自己。' },
  { q:'什麼會讓你感到恐懼？',       a:'不知道自己要什麼。\n還有，明明知道要什麼，\n卻沒有勇氣去要。' },
  { q:'你的夢想是什麼？',           a:'寫出讓人覺得\n「我也是」的文字。\n然後，好好睡一覺。' },
  { q:'如何面對離別？',             a:'假裝自己早就準備好了。\n等對方走了，\n再哭。' },
  { q:'你喜歡現在的自己嗎？',       a:'喜歡一部分。\n不喜歡的那部分，\n我還在想辦法。' },
  { q:'什麼是勇敢？',               a:'知道可能沒有結果，\n還是說了。' },
  { q:'記憶中最深刻的畫面？',       a:'不是什麼大事。\n是某個人某天的眼神，\n我一直記得。' },
  { q:'你常哭還是常笑？',           a:'常笑。\n哭的時候，\n很用力。' },
  { q:'寫作對你的意義是？',         a:'把說不出口的，\n寫出來。\n讓它有個地方待著。' },
  { q:'你是一個念舊的人嗎？',       a:'很念舊。\n舊的東西捨不得丟，\n舊的人，也是。' },
  { q:'什麼讓你覺得溫暖？',         a:'有人在你不說的時候\n就已經注意到了。' },
  { q:'理想的生活狀態是？',         a:'忙，但是是自己選的忙。\n累，但是是有意義的累。' },
  { q:'你相信直覺嗎？',             a:'相信。\n直覺從不說謊，\n是我有時候假裝沒聽到。' },
  { q:'如何排解負面情緒？',         a:'走出去。\n讓身體動，\n腦子才會慢慢靜下來。' },
  { q:'什麼是成長？',               a:'以前很在意的事，\n現在不在意了。\n不是不重要，\n是你變大了。' },
  { q:'你覺得自己特別嗎？',         a:'不特別。\n但我相信每個人身上\n都有一件特別的事。' },
  { q:'什麼會讓你感到嫉妒？',       a:'看到有人\n把我想做的事做得很好，\n而我還沒開始。' },
  { q:'你對時間的看法？',           a:'它很公平，\n每個人都一樣多。\n但我們花的地方，\n差很多。' },
  { q:'什麼是溫柔？',               a:'不把自己的答案，\n強加給別人的問題上。' },
  { q:'你會向人傾訴嗎？',           a:'會。\n但先確認對方今天\n有沒有力氣接住。' },
  { q:'最想回到哪一個時刻？',       a:'不是最快樂的那天，\n是某個普通的日子——\n我當時不知道那有多好。' },
  { q:'你是一個固執的人嗎？',       a:'是。\n在認為對的事情上，\n是。' },
  { q:'什麼是信任？',               a:'不用問「你相信我嗎」\n也知道答案的狀態。' },
  { q:'你害怕變老嗎？',             a:'不怕變老，\n怕老了，\n卻沒有活過。' },
  { q:'什麼會讓你感到滿足？',       a:'把一件事做完，做好，\n然後關掉電腦。' },
  { q:'你的偶像是誰？',             a:'沒有固定的偶像。\n但有很多人，\n在某個瞬間讓我想要更好。' },
  { q:'什麼是幸福？',               a:'不需要羨慕別人\n的時刻。' },
  { q:'你是一個浪漫的人嗎？',       a:'是。\n只是我的浪漫藏在日常裡，\n不太容易被看到。' },
  { q:'什麼會讓你感到失落？',       a:'用力了，\n但對方沒有感覺到。\n或者感覺到了，\n沒有說。' },
  { q:'你如何定義成功？',           a:'晚上睡得著。\n不是因為累，\n是因為問心無愧。' },
  { q:'你的底線是什麼？',           a:'不能讓我懷疑\n自己本來沒有問題。' },
  { q:'什麼會讓你感到平靜？',       a:'一個人待著，\n什麼都不用解釋，\n什麼都不用表演。' },
  { q:'你是一個容易原諒別人的人嗎？', a:'容易原諒，\n不容易忘記。\n這兩件事，\n我一直分不清楚。' },
  { q:'什麼是愛自己？',             a:'不替讓你難受的事情\n找理由。' },
  { q:'你對未來的期許是？',         a:'希望未來的我，\n回頭看現在，\n會說「那段時間，我很努力。」' },
  { q:'什麼會讓你感到焦慮？',       a:'不知道現在做的事有沒有意義。\n還有，不知道\n什麼時候才能知道。' },
  { q:'你喜歡黑夜還是白天？',       a:'黑夜。\n黑夜裡，\n所有事情都可以先不管。' },
  { q:'什麼是原諒？',               a:'不再讓那件事，\n決定你今天的心情。' },
  { q:'你是一個善於表達的人嗎？',   a:'寫的時候是。\n說的時候，\n常常說到一半就算了。' },
  { q:'什麼會讓你感到感動？',       a:'有人在你不知道的時候，\n一直記掛著你，\n然後你某天才知道。' },
  { q:'你相信一見鍾情嗎？',         a:'相信。\n但我更相信，\n日久生情，\n是更深的一見鍾情。' },
  { q:'什麼是痛苦？',               a:'想靠近，\n又不確定值不值得，\n然後在這個猶豫裡，\n耗掉了。' },
  { q:'你對友情的看法？',           a:'不用天天聯絡，\n但需要的時候，\n一通電話就在了。' },
  { q:'什麼會讓你感到後悔？',       a:'當時沒說出口的話，\n後來，\n沒有機會說了。' },
  { q:'你覺得自己像什麼動物？',     a:'貓。\n需要人，\n但不說。' },
  { q:'什麼是希望？',               a:'今天很難，\n但還是設了\n明天的鬧鐘。' },
  { q:'你對家人的感覺？',           a:'複雜。\n愛是真的，\n有時候累也是真的，\n然後又愛了。' },
  { q:'什麼會讓你感到孤獨？',       a:'想說一件事，\n想了很久，\n最後沒有人可以說。' },
  { q:'你對金錢的看法？',           a:'它不是最重要的，\n但沒有它，\n很多重要的事都做不了。' },
  { q:'什麼是迷茫？',               a:'地圖在手上，\n卻不知道自己在哪裡。' },
  { q:'你對旅行的定義是？',         a:'暫時讓自己，\n從自己的生活裡缺席一下。' },
  { q:'什麼會讓你感到充實？',       a:'做完一件拖了很久的事。\n還有，陪了一個\n需要被陪的人。' },
  { q:'你對美麗的看法？',           a:'美麗是一個人\n認真活著的樣子。' },
  { q:'什麼會讓你感到疲憊？',       a:'一直解釋自己，\n卻還是被誤解。' },
  { q:'你對生活的態度？',           a:'接住它扔給我的，\n然後再扔回去。' },
  { q:'什麼是絕望？',               a:'不是最壞的情況，\n是相信，\n它會一直是這樣了。' },
  { q:'你如何面對失敗？',           a:'先讓自己難過夠了，\n再站起來。\n跳過難過那步，\n只會站得更慢。' },
  { q:'什麼會讓你感到興奮？',       a:'一個剛萌芽的想法，\n還沒有人知道，\n只有我自己。' },
  { q:'你對愛的極限是？',           a:'當我開始懷疑\n自己在這段關係裡是誰，\n就是了。' },
  { q:'什麼是嫉妒？',               a:'他有的，\n是你以為自己不配要的。' },
  { q:'你相信奇蹟嗎？',             a:'相信。\n我本人，\n就已經是幾個奇蹟的結果了。' },
  { q:'什麼會讓你感到平淡？',       a:'連期待都懶得有，\n連失望\n都不用了。' },
  { q:'你如何看待改變？',           a:'改變讓我害怕，\n但不改變，\n更讓我害怕。' },
  { q:'什麼是依賴？',               a:'不是需要他，\n是不知道沒有他，\n自己還算不算自己。' },
  { q:'你對承諾的看法？',           a:'說出口的那一刻，\n要是真的。' },
  { q:'什麼會讓你感到驚喜？',       a:'對方記得我隨口說的那句話，\n然後在某天，\n它變成了一件事。' },
  { q:'你對執著的看法？',           a:'執著是一種愛，\n但有時候，\n放開也是。' },
  { q:'什麼是奉獻？',               a:'不覺得是在犧牲，就是奉獻。\n一直覺得委屈的，\n是另一種事。' },
  { q:'你如何面對背叛？',           a:'先相信自己的感覺，\n再決定要不要繼續。\n不用急著寬容。' },
  { q:'什麼會讓你感到純粹？',       a:'做一件事，\n沒有任何人知道，\n也沒有任何好處，\n但我還是做了。' },
  { q:'你對死亡的看法？',           a:'它讓我更認真看\n今天這一天。' },
  { q:'什麼是永恆？',               a:'某些感受，\n時間帶不走，\n比人還長壽。' },
  { q:'你對原諒的底線是？',         a:'原諒，\n但不再給機會，\n也是一種原諒。' },
  { q:'什麼會讓你感到真實？',       a:'皮膚上的感覺，\n某個人說話時的眼神，\n還有說不清楚的感動。' },
  { q:'你如何看待緣分？',           a:'緣分是敲門，\n要不要開，\n是你的事。' },
  { q:'什麼是遺忘？',               a:'不是真的忘了，\n是它不再第一個\n出現在你腦海裡了。' },
  { q:'明天的你會是怎樣的？',       a:'不知道。\n但我希望，\n她還是願意好好的。' },
];

let idx = 0;
let flipped = false;
let animating = false;
let hinted = false;

const cardEl   = document.getElementById('card');
const frontEl  = document.getElementById('front');
const backEl   = document.getElementById('back');
const barEl    = document.getElementById('bar');
const labelEl  = document.getElementById('label');
const btnPrev  = document.getElementById('btnPrev');
const btnNext  = document.getElementById('btnNext');

function nl2br(s) { return s.replace(/\n/g, '<br>'); }

function render() {
  flipped = false;
  cardEl.classList.remove('flipped');

  if (idx === 0) {
    frontEl.innerHTML = `
      <div class="intro-body">她問她答，她問你答，你問她答。<br>
      100則問題、100篇回答，是不朽對生命的熱望。<br>
      她用這些生活中無以名狀的碎片，<br>
      拼湊出人生切切實實的模樣。<br>
      不用誰指點，不要人批改，<br>
      所有問題都沒有正確答案——<br>
      你，就是唯一的答案。</div>
      <div class="intro-cta">點擊開始</div>`;
    backEl.innerHTML = '';
    labelEl.textContent = '序';
    barEl.style.width = '0%';
  } else {
    const item = QA[idx];
    const num  = String(idx).padStart(2, '0');
    frontEl.innerHTML = `
      <div class="card-num">${num}</div>
      <div class="card-question">${item.q}</div>
      ${!hinted ? '<div class="card-hint">輕觸翻牌</div>' : ''}`;
    backEl.innerHTML = `<div class="card-answer">${nl2br(item.a)}</div>`;
    labelEl.textContent = `${idx} / 100`;
    barEl.style.width = (idx / 100 * 100) + '%';
  }

  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === 100;
}

function flip() {
  if (animating) return;
  if (idx === 0) { go(1); return; }
  hinted = true;
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function go(dir) {
  if (animating) return;
  const next = idx + dir;
  if (next < 0 || next > 100) return;
  animating = true;
  idx = next;
  render();
  setTimeout(() => { animating = false; }, 400);
}

cardEl.addEventListener('click', flip);
btnPrev.addEventListener('click', () => go(-1));
btnNext.addEventListener('click', () => go(1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

let tx = 0, ty = 0;
cardEl.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });
cardEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 12 && Math.abs(dy) < 12) flip();
  else if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
});

const overlay     = document.getElementById('listOverlay');
const listItemsEl = document.getElementById('listItems');
const listSearch  = document.getElementById('listSearch');
const btnMenu     = document.getElementById('btnMenu');
const btnClose    = document.getElementById('btnClose');

function buildList(filter) {
  listItemsEl.innerHTML = '';
  const f = (filter || '').toLowerCase();
  QA.forEach((item, i) => {
    if (!item) return;
    const num = String(i).padStart(2, '0');
    if (f && !num.includes(f) && !item.q.toLowerCase().includes(f)) return;
    const btn = document.createElement('button');
    btn.className = 'list-item';
    btn.innerHTML = '<span class="list-item-num">' + num + '</span><span class="list-item-q">' + item.q + '</span>';
    btn.addEventListener('click', () => { idx = i; render(); closeList(); });
    listItemsEl.appendChild(btn);
  });
}
function openList()  { overlay.classList.add('open'); buildList(''); listSearch.value = ''; listSearch.focus(); }
function closeList() { overlay.classList.remove('open'); }
btnMenu.addEventListener('click', openList);
btnClose.addEventListener('click', closeList);
overlay.addEventListener('click', e => { if (e.target === overlay) closeList(); });
listSearch.addEventListener('input', e => buildList(e.target.value));

render();
</script>
</body>
</html>
