<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小島醫學生的嚮往</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f5f0e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif TC', serif;
      padding: 20px;
      gap: 28px;
    }

    /* Progress bar */
    .progress-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: #e4ddd2;
    }
    .progress-bar {
      height: 100%;
      background: #b09268;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Header */
    header {
      position: fixed;
      top: 12px; left: 0; right: 0;
      display: flex;
      justify-content: center;
    }
    .site-title {
      font-size: 0.72rem;
      color: #bbb0a0;
      letter-spacing: 0.25em;
      font-weight: 300;
    }

    /* Card scene */
    .card-scene {
      width: 100%;
      max-width: 580px;
      height: 340px;
      perspective: 1400px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.35, 0, 0.25, 1);
      cursor: pointer;
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 40px;
      text-align: center;
      box-shadow: 0 6px 32px rgba(80,60,30,0.08), 0 1px 4px rgba(80,60,30,0.04);
    }

    .card-front { background: #ffffff; }
    .card-back  {
      background: #fdfcf9;
      transform: rotateY(180deg);
    }

    /* Intro */
    .intro-body {
      font-size: 0.95rem;
      color: #5c5248;
      line-height: 2.3;
      letter-spacing: 0.05em;
      font-weight: 300;
    }
    .intro-cta {
      margin-top: 28px;
      font-size: 0.68rem;
      color: #ccc0b0;
      letter-spacing: 0.35em;
      font-weight: 300;
    }

    /* Question */
    .card-num {
      font-size: 0.7rem;
      color: #cfc0a8;
      letter-spacing: 0.35em;
      margin-bottom: 24px;
      font-weight: 300;
    }
    .card-question {
      font-size: 1.38rem;
      color: #28241e;
      line-height: 1.9;
      letter-spacing: 0.08em;
    }
    .card-hint {
      margin-top: 28px;
      font-size: 0.66rem;
      color: #d8cfc4;
      letter-spacing: 0.3em;
      font-weight: 300;
    }

    /* Answer */
    .card-answer {
      font-size: 1.1rem;
      color: #3a352e;
      line-height: 2.3;
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .btn-nav {
      width: 42px;
      height: 42px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #a8987e;
      font-size: 1.1rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .btn-nav:hover:not(:disabled) {
      background: rgba(120,90,50,0.08);
      color: #5a4830;
    }
    .btn-nav:disabled {
      opacity: 0.2;
      cursor: default;
    }
    .progress-label {
      font-size: 0.72rem;
      color: #b8a890;
      letter-spacing: 0.2em;
      min-width: 64px;
      text-align: center;
      font-weight: 300;
    }

    @media (max-width: 480px) {
      .card-scene { height: 300px; }
      .card-face  { padding: 36px 28px; }
      .card-question { font-size: 1.2rem; }
      .card-answer   { font-size: 1rem; }
      .intro-body    { font-size: 0.88rem; }
    }
  </style>
</head>
<body>

  <div class="progress-bar-wrap"><div class="progress-bar" id="bar"></div></div>
  <header><span class="site-title">小島醫學生的嚮往</span></header>

  <div class="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="front"></div>
      <div class="card-face card-back"  id="back"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-nav" id="btnPrev" aria-label="上一題">&#8592;</button>
    <span class="progress-label" id="label"></span>
    <button class="btn-nav" id="btnNext" aria-label="下一題">&#8594;</button>
  </div>

function render() {

  if (idx === 0) {
    frontEl.innerHTML = `
      <div class="intro-body">她問她答，她問你答，你問她答。<br>
      100則問題、100篇回答，是小島醫學生的嚮往。<br>
      她用這些生活中無以名狀的碎片，<br>
      拼湊出人生切切實實的模樣。<br>
      不用誰指點，不要人批改，<br>
      所有問題都沒有正確答案——<br>
      你，就是唯一的答案。</div>
      <div class="intro-cta">點擊開始</div>`;
    backEl.innerHTML = '';
    labelEl.textContent = '序';
    barEl.style.width = '0%';
  } else {
    const item = QA[idx];
    const num  = String(idx).padStart(2, '0');
    frontEl.innerHTML = `
      <div class="card-num">${num}</div>
      <div class="card-question">${item.q}</div>
      ${!hinted ? '<div class="card-hint">輕觸翻牌</div>' : ''}`;
    backEl.innerHTML = `<div class="card-answer">${nl2br(item.a)}</div>`;
    labelEl.textContent = `${idx} / 100`;
    barEl.style.width = (idx / 100 * 100) + '%';
  }

  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === 100;
}

function flip() {
  if (animating) return;
  if (idx === 0) { go(1); return; }
  hinted = true;
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function go(dir) {
  if (animating) return;
  const next = idx + dir;
  if (next < 0 || next > 100) return;
  animating = true;
  idx = next;
  render();
  setTimeout(() => { animating = false; }, 400);
}

cardEl.addEventListener('click', flip);
btnPrev.addEventListener('click', () => go(-1));
btnNext.addEventListener('click', () => go(1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

let tx = 0, ty = 0;
cardEl.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });
cardEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 12 && Math.abs(dy) < 12) flip();
  else if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
});

render();
</script>
</body>
</html>
